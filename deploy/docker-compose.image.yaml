# LABLINE Multi-User Deployment with a prebuilt researcher image.
#
# Use this when a CI/build machine has already built and pushed the non-GPU
# Labline image. The target server only pulls the image and mounts per-user
# framework/project/state paths.
#
# Usage:
#   1. Copy .env.example -> .env and set LABLINE_IMAGE plus host paths
#   2. docker compose -f docker-compose.image.yaml pull
#   3. docker compose -f docker-compose.image.yaml up -d
#
# The prebuilt image has a fixed Linux user, usually "researcher". Per-user
# isolation comes from container names and mounted host directories.

services:
  gitea:
    image: gitea/gitea:latest
    container_name: labline-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"
      - "2222:22"
    restart: unless-stopped

  researcher-1:
    image: ${LABLINE_IMAGE:?set LABLINE_IMAGE in .env}
    container_name: labline-${USER1_NAME:-researcher1}
    hostname: labline-${USER1_NAME:-researcher1}
    network_mode: host
    environment:
      - LABLINE_PROXY_ENABLED=${LABLINE_PROXY_ENABLED:-1}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - GIT_HTTP_PROXY=${GIT_HTTP_PROXY:-}
      - GIT_HTTPS_PROXY=${GIT_HTTPS_PROXY:-}
      - LABLINE_AUTO_CHECK_UPDATE=${LABLINE_AUTO_CHECK_UPDATE:-1}
      - LABLINE_UPDATE_CHECK_INTERVAL=${LABLINE_UPDATE_CHECK_INTERVAL:-1d}
      - LABLINE_UPDATE_CHECK_TIMEOUT=${LABLINE_UPDATE_CHECK_TIMEOUT:-10s}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_USER_ID=${FEISHU_USER_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-open_id}
      - FEISHU_ENABLE_WS=${FEISHU_ENABLE_WS:-0}
      - BRIDGE_PORT=${BRIDGE_PORT:-5000}
      - LABLINE_PROJECT_ROOT=${LABLINE_PROJECT_ROOT:-/labline/framework}
      - LABLINE_FEISHU_CONTROL_ROOT=${LABLINE_FEISHU_CONTROL_ROOT:-}
      - GITEA_URL=${GITEA_URL:-http://127.0.0.1:3000}
    volumes:
      - ${USER1_FRAMEWORK_PATH:?set USER1_FRAMEWORK_PATH in .env}:/labline/framework
      - ${USER1_PROJECTS_PATH:?set USER1_PROJECTS_PATH in .env}:/labline/projects
      - ${USER1_STATE_PATH:?set USER1_STATE_PATH in .env}:/home/${LABLINE_IMAGE_USERNAME:-researcher}/.labline
      - ${DATASETS_PATH:?set DATASETS_PATH in .env}:/labline/shared/datasets:ro
      - ${DOWNLOADS_PATH:?set DOWNLOADS_PATH in .env}:/labline/shared/downloads
      - ${PRETRAINED_PATH:?set PRETRAINED_PATH in .env}:/labline/shared/pretrained
      - ${USER1_SSH:-/dev/null}:/run/secrets/ssh:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - gitea

  researcher-2:
    image: ${LABLINE_IMAGE:?set LABLINE_IMAGE in .env}
    container_name: labline-${USER2_NAME:-researcher2}
    hostname: labline-${USER2_NAME:-researcher2}
    network_mode: host
    environment:
      - LABLINE_PROXY_ENABLED=${LABLINE_PROXY_ENABLED:-1}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - GIT_HTTP_PROXY=${GIT_HTTP_PROXY:-}
      - GIT_HTTPS_PROXY=${GIT_HTTPS_PROXY:-}
      - LABLINE_AUTO_CHECK_UPDATE=${LABLINE_AUTO_CHECK_UPDATE:-1}
      - LABLINE_UPDATE_CHECK_INTERVAL=${LABLINE_UPDATE_CHECK_INTERVAL:-1d}
      - LABLINE_UPDATE_CHECK_TIMEOUT=${LABLINE_UPDATE_CHECK_TIMEOUT:-10s}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_USER_ID=${FEISHU_USER_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-open_id}
      - FEISHU_ENABLE_WS=${FEISHU_ENABLE_WS:-0}
      - BRIDGE_PORT=${BRIDGE_PORT:-5000}
      - LABLINE_PROJECT_ROOT=${LABLINE_PROJECT_ROOT:-/labline/framework}
      - LABLINE_FEISHU_CONTROL_ROOT=${LABLINE_FEISHU_CONTROL_ROOT:-}
      - GITEA_URL=${GITEA_URL:-http://127.0.0.1:3000}
    volumes:
      - ${USER2_FRAMEWORK_PATH:?set USER2_FRAMEWORK_PATH in .env}:/labline/framework
      - ${USER2_PROJECTS_PATH:?set USER2_PROJECTS_PATH in .env}:/labline/projects
      - ${USER2_STATE_PATH:?set USER2_STATE_PATH in .env}:/home/${LABLINE_IMAGE_USERNAME:-researcher}/.labline
      - ${DATASETS_PATH:?set DATASETS_PATH in .env}:/labline/shared/datasets:ro
      - ${DOWNLOADS_PATH:?set DOWNLOADS_PATH in .env}:/labline/shared/downloads
      - ${PRETRAINED_PATH:?set PRETRAINED_PATH in .env}:/labline/shared/pretrained
      - ${USER2_SSH:-/dev/null}:/run/secrets/ssh:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - gitea

volumes:
  gitea-data:
