# ARIS Multi-User Deployment
# One long-running container per researcher.
# Each researcher gets an isolated framework checkout and projects directory.
# Datasets, pretrained models, and download cache are shared across researcher
# containers.
#
# Usage:
#   1. Copy this file to your group server
#   2. Edit .env file with user list and API keys
#   3. docker compose up -d
#   4. docker exec -it aris-zhangsan bash
#
# Add more users: copy a researcher block and change name/UID/GID/SSH,
# USERn_FRAMEWORK_PATH, and USERn_PROJECTS_PATH.

services:
  # ─── Self-hosted Git (Gitea) ──────────────────────────────────────────────
  gitea:
    image: gitea/gitea:latest
    container_name: aris-gitea
    environment:
      - USER_UID=1000
      - USER_GID=1000
    volumes:
      - gitea-data:/data
      - /etc/timezone:/etc/timezone:ro
      - /etc/localtime:/etc/localtime:ro
    ports:
      - "3000:3000"     # Web UI
      - "2222:22"       # Git SSH
    restart: unless-stopped

  # ─── Researcher containers (copy block per user) ──────────────────────────
  researcher-1:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        USERNAME: ${USER1_NAME:-researcher1}
        UID: ${USER1_UID:-1001}
        GID: ${USER1_GID:-1001}
    container_name: aris-${USER1_NAME:-researcher1}
    hostname: aris-${USER1_NAME:-researcher1}
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - GIT_HTTP_PROXY=${GIT_HTTP_PROXY:-}
      - GIT_HTTPS_PROXY=${GIT_HTTPS_PROXY:-}
      - ARIS_AUTO_CHECK_UPDATE=${ARIS_AUTO_CHECK_UPDATE:-1}
      - ARIS_UPDATE_CHECK_INTERVAL=${ARIS_UPDATE_CHECK_INTERVAL:-1d}
      - ARIS_UPDATE_CHECK_TIMEOUT=${ARIS_UPDATE_CHECK_TIMEOUT:-10s}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_USER_ID=${FEISHU_USER_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-open_id}
      - FEISHU_ENABLE_WS=${FEISHU_ENABLE_WS:-0}
      - BRIDGE_PORT=${BRIDGE_PORT:-5000}
      - ARIS_PROJECT_ROOT=${ARIS_PROJECT_ROOT:-/aris/framework}
      - ARIS_FEISHU_CONTROL_ROOT=${ARIS_FEISHU_CONTROL_ROOT:-}
      - ARIS_WORKSPACE=/aris
      - GITEA_URL=http://gitea:3000
    volumes:
      # Per-user framework checkout: user controls update/rollback.
      - ${USER1_FRAMEWORK_PATH:?set USER1_FRAMEWORK_PATH in .env}:/aris/framework
      # Per-user projects: do not share this path with another researcher.
      - ${USER1_PROJECTS_PATH:?set USER1_PROJECTS_PATH in .env}:/aris/projects
      # Per-user ARIS local state: project registry, framework rollback history.
      - ${USER1_STATE_PATH:?set USER1_STATE_PATH in .env}:/aris/.aris
      # Shared datasets (read-only)
      - ${DATASETS_PATH:?set DATASETS_PATH in .env}:/aris/shared/datasets:ro
      # Shared download cache
      - ${DOWNLOADS_PATH:?set DOWNLOADS_PATH in .env}:/aris/shared/downloads
      # Shared pretrained models/cache
      - ${PRETRAINED_PATH:?set PRETRAINED_PATH in .env}:/aris/shared/pretrained
      # SSH keys (mount from host)
      - ${USER1_SSH:-/dev/null}:/run/secrets/ssh:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - gitea

  researcher-2:
    build:
      context: ..
      dockerfile: deploy/Dockerfile
      args:
        USERNAME: ${USER2_NAME:-researcher2}
        UID: ${USER2_UID:-1002}
        GID: ${USER2_GID:-1002}
    container_name: aris-${USER2_NAME:-researcher2}
    hostname: aris-${USER2_NAME:-researcher2}
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - GIT_HTTP_PROXY=${GIT_HTTP_PROXY:-}
      - GIT_HTTPS_PROXY=${GIT_HTTPS_PROXY:-}
      - ARIS_AUTO_CHECK_UPDATE=${ARIS_AUTO_CHECK_UPDATE:-1}
      - ARIS_UPDATE_CHECK_INTERVAL=${ARIS_UPDATE_CHECK_INTERVAL:-1d}
      - ARIS_UPDATE_CHECK_TIMEOUT=${ARIS_UPDATE_CHECK_TIMEOUT:-10s}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_USER_ID=${FEISHU_USER_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-open_id}
      - FEISHU_ENABLE_WS=${FEISHU_ENABLE_WS:-0}
      - BRIDGE_PORT=${BRIDGE_PORT:-5000}
      - ARIS_PROJECT_ROOT=${ARIS_PROJECT_ROOT:-/aris/framework}
      - ARIS_FEISHU_CONTROL_ROOT=${ARIS_FEISHU_CONTROL_ROOT:-}
      - ARIS_WORKSPACE=/aris
      - GITEA_URL=http://gitea:3000
    volumes:
      - ${USER2_FRAMEWORK_PATH:?set USER2_FRAMEWORK_PATH in .env}:/aris/framework
      # Per-user projects: do not share this path with another researcher.
      - ${USER2_PROJECTS_PATH:?set USER2_PROJECTS_PATH in .env}:/aris/projects
      # Per-user ARIS local state: project registry, framework rollback history.
      - ${USER2_STATE_PATH:?set USER2_STATE_PATH in .env}:/aris/.aris
      - ${DATASETS_PATH:?set DATASETS_PATH in .env}:/aris/shared/datasets:ro
      - ${DOWNLOADS_PATH:?set DOWNLOADS_PATH in .env}:/aris/shared/downloads
      # Shared pretrained models/cache
      - ${PRETRAINED_PATH:?set PRETRAINED_PATH in .env}:/aris/shared/pretrained
      - ${USER2_SSH:-/dev/null}:/run/secrets/ssh:ro
    stdin_open: true
    tty: true
    restart: unless-stopped
    depends_on:
      - gitea

volumes:
  gitea-data:
