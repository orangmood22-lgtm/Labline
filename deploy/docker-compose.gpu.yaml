# LABLINE Single-User GPU Deployment
# For deploying LABLINE with full GPU access on a single machine.
#
# Usage:
#   1. Copy deploy/ dir to GPU server
#   2. Copy .env.gpu.example → .env, fill in values
#   3. docker compose -f docker-compose.gpu.yaml up -d
#   4. docker exec -it labline-gpu bash

services:
  labline:
    build:
      context: ..
      dockerfile: deploy/Dockerfile.gpu
      args:
        USERNAME: ${USERNAME:-researcher}
        UID: ${USER_UID:-1000}
        GID: ${USER_GID:-1000}
        LABLINE_BRANCH: ${LABLINE_BRANCH:-orangmood-tripartite-night-20260512}
        BUILD_HTTP_PROXY: ${HTTP_PROXY:-}
        BUILD_HTTPS_PROXY: ${HTTPS_PROXY:-}
    container_name: labline-gpu
    hostname: labline-gpu
    environment:
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_BASE_URL=${ANTHROPIC_BASE_URL:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - HTTP_PROXY=${HTTP_PROXY:-}
      - HTTPS_PROXY=${HTTPS_PROXY:-}
      - NO_PROXY=${NO_PROXY:-}
      - http_proxy=${http_proxy:-}
      - https_proxy=${https_proxy:-}
      - no_proxy=${no_proxy:-}
      - GIT_HTTP_PROXY=${GIT_HTTP_PROXY:-}
      - GIT_HTTPS_PROXY=${GIT_HTTPS_PROXY:-}
      - LABLINE_AUTO_CHECK_UPDATE=${LABLINE_AUTO_CHECK_UPDATE:-1}
      - LABLINE_UPDATE_CHECK_INTERVAL=${LABLINE_UPDATE_CHECK_INTERVAL:-1d}
      - LABLINE_UPDATE_CHECK_TIMEOUT=${LABLINE_UPDATE_CHECK_TIMEOUT:-10s}
      - FEISHU_APP_ID=${FEISHU_APP_ID:-}
      - FEISHU_APP_SECRET=${FEISHU_APP_SECRET:-}
      - FEISHU_USER_ID=${FEISHU_USER_ID:-}
      - FEISHU_RECEIVE_ID_TYPE=${FEISHU_RECEIVE_ID_TYPE:-open_id}
      - FEISHU_ENABLE_WS=${FEISHU_ENABLE_WS:-0}
      - BRIDGE_PORT=${BRIDGE_PORT:-5000}
      - LABLINE_PROJECT_ROOT=${LABLINE_PROJECT_ROOT:-/labline/framework}
      - LABLINE_FEISHU_CONTROL_ROOT=${LABLINE_FEISHU_CONTROL_ROOT:-}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      - CUDA_VISIBLE_DEVICES=${CUDA_VISIBLE_DEVICES:-}
    volumes:
      # Framework checkout used by install_labline.sh and agent skills.
      - ${FRAMEWORK_PATH:?set FRAMEWORK_PATH in .env}:/labline/framework
      # Optional dev framework checkout; install_labline.sh --dev discovers /labline/labline-dev.
      - ${DEV_FRAMEWORK_PATH:?set DEV_FRAMEWORK_PATH in .env}:/labline/labline-dev
      # Project directory (your exp0516 etc.)
      - ${PROJECT_PATH:?set PROJECT_PATH in .env}:/labline/projects
      # Datasets (optional, read-only)
      - ${DATASETS_PATH:?set DATASETS_PATH in .env}:/labline/shared/datasets:ro
      # Pretrained models cache
      - ${PRETRAINED_PATH:?set PRETRAINED_PATH in .env}:/labline/shared/pretrained
      # SSH keys from host
      - ${SSH_PATH:?set SSH_PATH in .env}:/run/secrets/ssh:ro
      # Persist claude/codex config across rebuilds
      - claude-config:/home/${USERNAME:-researcher}/.claude
      - codex-config:/home/${USERNAME:-researcher}/.codex
      - labline-state:/home/${USERNAME:-researcher}/.labline
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
    stdin_open: true
    tty: true
    restart: unless-stopped
    # Keep container running
    command: ["bash"]

volumes:
  pretrained-cache:
  claude-config:
  codex-config:
  labline-state:
